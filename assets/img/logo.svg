<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">

  <style>
    .logo-bg { fill: #111111; }
    .accent { fill: #FF6B00; }
    .accent-light { fill: #FF8C33; }
    .white { fill: #FFFFFF; }
    .dark { fill: #111111; }
    .logo-text { font-family: sans-serif; font-weight: 500; }
    .tag-text { font-family: sans-serif; font-weight: 400; }
  </style>

  <rect x="0" y="0" width="400" height="240" rx="16" class="logo-bg"/>

  <rect x="60" y="50" width="50" height="8" rx="4" class="accent"/>
  <rect x="60" y="66" width="34" height="8" rx="4" class="accent-light"/>
  <rect x="60" y="82" width="42" height="8" rx="4" class="accent"/>

  <rect x="122" y="50" width="12" height="40" rx="3" class="accent"/>
  <polygon points="134,50 158,70 134,90" fill="#FF6B00"/>

  <text x="200" y="88" class="logo-text white" font-size="32" text-anchor="middle">SkillMatch</text>

  <rect x="150" y="98" width="100" height="24" rx="6" class="accent"/>
  <text x="200" y="115" class="tag-text dark" font-size="13" text-anchor="middle">JS</text>

  <text x="200" y="160" class="tag-text" font-size="13" text-anchor="middle" fill="#888888">simulador de compatibilidade</text>

  <circle cx="45" cy="200" r="4" class="accent"/>
  <circle cx="57" cy="200" r="4" class="accent-light"/>
  <circle cx="69" cy="200" r="4" fill="#555"/>
  <line x1="85" y1="200" x2="320" y2="200" stroke="#333" stroke-width="1"/>
  <circle cx="330" cy="200" r="4" fill="#555"/>
  <circle cx="342" cy="200" r="4" class="accent-light"/>
  <circle cx="354" cy="200" r="4" class="accent"/>

</svg>